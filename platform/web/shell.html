<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>I KNOW WHAT I SAW</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #05050a; color: #6a6a78;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overflow: hidden;
  }
  #wrap {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
  }
  /* The canvas fills what it can while staying 3:2 -- and NEAREST-neighbour,
     because a blurry pixel game is a broken pixel game. */
  canvas {
    display: block;
    background: #000;
    aspect-ratio: 3 / 2;
    max-width: 100vw;
    max-height: 82vh;
    width: auto; height: 82vh;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    outline: none;
    border: 1px solid #1c1c26;
  }
  #hint { font-size: 12px; letter-spacing: .06em; text-align: center; }
  #hint b { color: #b8b8c4; font-weight: 600; }
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #05050a; color: #8a8a98;
    font-size: 13px; letter-spacing: .18em;
    transition: opacity .5s;
  }
  #boot.gone { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
    <div id="hint">
      <b>ARROWS</b>/WASD move &nbsp;·&nbsp; <b>Z</b> confirm &nbsp;·&nbsp;
      <b>X</b> shoot &nbsp;·&nbsp; <b>ENTER</b> pack &nbsp;·&nbsp;
      <b>ESC</b> menu &nbsp;·&nbsp; a gamepad works too
    </div>
  </div>

  <div id="boot">OCTOBER 3, 1987…</div>

<script>
  var canvas = document.getElementById('canvas');

  var Module = {
    canvas: canvas,
    print:    function (t) { console.log(t); },
    printErr: function (t) { console.warn(t); },
    onRuntimeInitialized: function () {
      document.getElementById('boot').classList.add('gone');
      canvas.focus();
    }
  };

  /* The game owns the keyboard. Without this the arrow keys scroll the page
     out from under you and space bar jumps it -- which, in a game where you
     walk with the arrows and confirm with a key, is unplayable. */
  window.addEventListener('keydown', function (e) {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'].indexOf(e.key) >= 0)
      e.preventDefault();
  }, false);

  /* Browsers refuse to make a sound until the user has interacted with the
     page. Any click or key counts -- once one lands, wake the audio up. */
  function unmute() {
    if (typeof Module !== 'undefined' && Module.SDL2 && Module.SDL2.audioContext)
      Module.SDL2.audioContext.resume();
    canvas.focus();
  }
  window.addEventListener('mousedown', unmute);
  window.addEventListener('keydown', unmute);
  window.addEventListener('touchstart', unmute);
</script>
{{{ SCRIPT }}}
</body>
</html>
