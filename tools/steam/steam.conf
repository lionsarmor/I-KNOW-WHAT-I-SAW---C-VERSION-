# -------------------------------------------------------------------------
# Steam upload config for `tools/steam/upload.sh`.
#
#   tools/steam/upload.sh --preview  # dry run: build + stage + validate, upload NOTHING
#   tools/steam/upload.sh            # real upload (build stays OFF all branches)
#
# APPID / DEPOT_CONTENT are the demo app's IDs from Steamworks. Both Windows
# and Linux files ship in the ONE content depot; per-OS launch options (set in
# Steamworks) pick which executable each player runs. See README.md.
# -------------------------------------------------------------------------

APPID=4985930
DEPOT_CONTENT=4985931

# Your Steam account *username* (the name you type to log in -- NOT your
# display/persona name, NOT an email, and NOT the password). steamcmd prompts
# for the password + Steam Guard live on first run and caches a token; no
# password is ever stored here. Confirm this matches your Steam LOGIN name.
STEAM_USER=dayzmelttogether

# Auto-promote the upload to this branch. Empty = upload only, then promote by
# hand in SteamPipe -> Builds (SAFEST). Never point a script at the public
# "default" branch -- promote the live demo build manually.
BRANCH=
